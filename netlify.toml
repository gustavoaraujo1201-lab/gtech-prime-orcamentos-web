[build]
  publish = "."

# Raiz vai direto para /login
[[redirects]]
  from = "/"
  to = "/login"
  status = 301

# Remove .html — redireciona permanentemente
[[redirects]]
  from = "/login.html"
  to = "/login"
  status = 301

[[redirects]]
  from = "/index.html"
  to = "/index"
  status = 301

# Serve os arquivos nas URLs limpas
[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 301

[[redirects]]
  from = "/index"
  to = "/index.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"